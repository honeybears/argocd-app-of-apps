apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authelia
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: authelia=authelia/authelia:latest
    argocd-image-updater.argoproj.io/authelia.update-strategy: latest
spec:
  project: default
  source:
    repoURL: https://github.com/honeybears/argocd-app-of-apps.git
    targetRevision: HEAD
    path: authelia
  destination:
    server: https://kubernetes.default.svc
    namespace: authelia
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - CreateNamespace=true
      - ServerSideApply=true
      - PruneLast=true
