apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-processor-worker-ingest
  labels:
    app: media-processor
    role: worker-ingest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: media-processor
      role: worker-ingest
  template:
    metadata:
      labels:
        app: media-processor
        role: worker-ingest
    spec:
      containers:
        - name: worker
          image: registry.lipcloud.org/media-processor:latest
          env:
            - name: WORKER_ROLE
              value: ingest
          envFrom:
            - configMapRef:
                name: media-processor-config
            - secretRef:
                name: media-processor-env
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
