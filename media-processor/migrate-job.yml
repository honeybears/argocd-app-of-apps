apiVersion: batch/v1
kind: Job
metadata:
  name: media-processor-migrate
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      name: media-processor-migrate
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: registry.lipcloud.org/media-processor:latest
          command: ["npx", "prisma", "migrate", "deploy"]
          envFrom:
            - secretRef:
                name: media-processor-env
          resources:
            requests:
              memory: "128Mi"
              cpu: "25m"
            limits:
              memory: "512Mi"
              cpu: "500m"
