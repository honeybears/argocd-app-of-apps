apiVersion: v1
kind: ConfigMap
metadata:
  name: authelia-config
  namespace: authelia
data:
  configuration.yml: |
    theme: auto
    default_2fa_method: totp

    server:
      address: 'tcp://0.0.0.0:9091/'

    log:
      level: info
      format: text

    identity_validation:
      reset_password:
        jwt_secret: k8s-authelia-jwt-secret-0123456789abcdef

    authentication_backend:
      password_reset:
        disable: false
      file:
        path: /config/users_database.yml

    access_control:
      default_policy: deny
      rules:
        - domain: "*.lipcloud.org"
          policy: one_factor

    session:
      secret: k8s-authelia-session-secret-9876543210fedcba
      expiration: 3600
      inactivity: 300
      cookies:
        - name: authelia_session
          domain: lipcloud.org
          authelia_url: https://auth.lipcloud.org

    storage:
      encryption_key: k8s-authelia-storage-key-4567890123abcdefghijklmnopqrstuvwxyz
      postgres:
        address: tcp://postgres-service.postgres.svc.cluster.local:5432
        database: authelia
        username: admin
        password: passwordTest
        schema: public

    notifier:
      disable_startup_check: true
      filesystem:
        filename: /config/notification.txt
